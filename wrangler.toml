name = "vlaky"
main = "src/index.js"
compatibility_date = "2025-06-01"

routes = [
  { pattern = "vlaky.ensecnet.net", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "vlaky"
database_id = "7f47d5d7-25f3-4ca3-b5bd-afbbfc635ebf"

[observability]
enabled = true

# /ops dashboard má HTTP Basic Auth. Nastav meno+heslo ako secrets:
#   npx wrangler secret put OPS_USER
#   npx wrangler secret put OPS_PASS
# Otvor /ops → prehliadač vyhodí prihlasovacie okno.
# (Voliteľne navrch: Cloudflare Access nad /ops pre login cez Google/MFA.)
