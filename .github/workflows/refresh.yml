name: Mesacny refresh GTFS dat do D1

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: npm install

      - name: Stiahni GTFS
        run: |
          curl -L -A "Mozilla/5.0" \
            "https://data.slovensko.sk/download?id=f63ef0f2-c4e7-496b-bdd1-44ba0e9438e9" \
            -o gtfs.zip
          SIZE=$(stat -c%s gtfs.zip)
          if [ "$SIZE" -lt 200000 ]; then echo "GTFS zip podozrivo maly"; exit 1; fi

      - name: Sprac GTFS
        run: node build-d1.js gtfs.zip

      - name: Nahraj do D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute vlaky --remote --file=./data/seed.sql -y
